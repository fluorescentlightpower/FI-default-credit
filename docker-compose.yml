services:
  ml_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credit_default_ml_service
    expose:
      - "3031"

  nginx:
    image: nginx:1.25
    container_name: credit_default_nginx
    ports:
      - "5000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ml_service